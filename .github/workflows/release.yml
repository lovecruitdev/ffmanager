name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g. v3.1.0)

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: get_version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Sync version into version.json, logo.svg, README.md
        shell: bash
        run: python scripts/update_version.py "${{ steps.get_version.outputs.version }}"

      - name: Commit version sync back to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json logo.svg README.md
          if git diff --cached --quiet; then
            echo "Version files already in sync - nothing to commit."
          else
            git commit -m "chore: sync version to v${{ steps.get_version.outputs.version }} [skip ci]"
            git push origin main
          fi

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build EXE with PyInstaller
        run: python build_exe.py

      - name: Install Inno Setup
        run: |
          choco install innosetup

      - name: Build Installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        shell: powershell

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          # Extract the section between ## [VERSION] and the next ## [
          BODY=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          # Write to file to avoid escaping issues
          echo "$BODY" > release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FFM_Installer.exe
          body_path: release_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
